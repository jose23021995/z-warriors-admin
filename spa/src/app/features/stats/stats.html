<app-headers title="ESTADISTICAS DE PODERES"></app-headers>

<section class="card-body">
    <div class="header-border"></div>
    <div class="mb-4 p-8">
        <p-card>
            <div class="card p-4 shadow-4 border-round bg-gray-900" style="min-height: 800px">
                <h2 class="text-center text-yellow-500 mb-4 font-bold">RÁNKING DE PODER Z (MENOR A MAYOR)</h2>
                
                <div id="estadisticas" class="h-full">
                    <!-- 1. Usamos data() en el @if -->
                    @if (data()) {
                        <!-- 2. Usamos data() y options() con paréntesis -->
                        <p-chart 
                            type="bar" 
                            [data]="data()" 
                            [options]="options()" 
                            height="750px"
                            (onDataSelect)="onChartClick($event)" />
                    } 
                    @else {
                        <!-- Spinner mientras carga -->
                        <div class="flex justify-content-center align-items-center" style="height: 400px">
                            <i class="pi pi-spin pi-spinner text-yellow-500" style="font-size: 3rem"></i>
                        </div>
                    }
                </div>
            </div>
        </p-card>
    </div>
</section>
