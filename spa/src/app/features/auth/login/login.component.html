<div class="login-container">
  <div style="position: absolute; top: 20px; right: 20px;">
    <button 
      (click)="toggleDarkMode()" 
      type="button"
      [ngStyle]="{
        'padding': '8px 12px',
        'background': isDarkMode ? '#fff' : '#333',
        'color': isDarkMode ? '#333' : '#fff',
        'border': 'none',
        'border-radius': '4px',
        'cursor': 'pointer'
      }">
      <span *ngIf="!isDarkMode">🌙 Modo Oscuro</span>
      <span *ngIf="isDarkMode">☀️ Modo Claro</span>
    </button>
  </div>

  <p-card header="Z-Warriors Admin" subheader="Bienvenido al panel de control" [style]="{ width: '360px' }">
    
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="flex flex-column gap-4">
      
      <!-- Campo Usuario -->
      <div class="field">
        <p-floatLabel>
          <input pInputText id="username" formControlName="username" class="w-full" />
          <label for="username">Usuario</label>
        </p-floatLabel>
      </div>

      <!-- Campo Contraseña -->
      <div class="field">
        <p-floatLabel>
          <p-password 
            id="password" 
            formControlName="password" 
            [toggleMask]="true" 
            [feedback]="false" 
            styleClass="w-full" 
            inputStyleClass="w-full">
          </p-password>
          <label for="password">Contraseña</label>
        </p-floatLabel>
      </div>

      <!-- Botón de Acción -->
      <div class="mt-2">
        <p-button 
          label="Acceder" 
          type="submit" 
          styleClass="w-full" 
          [disabled]="loginForm.invalid">
        </p-button>
      </div>

    </form>
  </p-card>
</div>
