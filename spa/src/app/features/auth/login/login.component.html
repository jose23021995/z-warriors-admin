<div class="login-container">
  <p-card header="Z-Warriors Admin" subheader="Bienvenido al panel de control" [style]="{ width: '360px' }">
    
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="flex flex-column gap-4">
      
      <!-- Campo Usuario -->
      <div class="field">
        <p-floatLabel>
          <input pInputText id="username" formControlName="username" class="w-full" />
          <label for="username">Usuario</label>
        </p-floatLabel>
      </div>

      <!-- Campo Contraseña -->
      <div class="field">
        <p-floatLabel>
          <p-password 
            id="password" 
            formControlName="password" 
            [toggleMask]="true" 
            [feedback]="false" 
            styleClass="w-full" 
            inputStyleClass="w-full">
          </p-password>
          <label for="password">Contraseña</label>
        </p-floatLabel>
      </div>

      <!-- Botón de Acción -->
      <div class="mt-2">
        <p-button 
          label="Acceder" 
          type="submit" 
          styleClass="w-full" 
          [disabled]="loginForm.invalid">
        </p-button>
      </div>

    </form>
  </p-card>
</div>
