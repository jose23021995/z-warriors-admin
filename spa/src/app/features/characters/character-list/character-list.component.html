<app-headers title="PERSONAJES"></app-headers>
<section class="card-body">
  <div class="header-border"></div>
  <div class="mb-4 p-8">
    <p-card>
      <app-character-table
        [characters]="characters()" 
        [totalRecords]="totalCount()" 
        [loading]="isLoading()" 
        (onLoadData)="handleLoadData($event)"
        (onCharacterSelected)="handleCharacterUpdate($event)">
      </app-character-table>
    </p-card>
  </div>
</section>
@if (isLoading()) {
    <div class="flex justify-content-center p-4">
        <p-progressSpinner strokeWidth="4" [style]="{width: '50px', height: '50px'}"></p-progressSpinner>
    </div>
}
