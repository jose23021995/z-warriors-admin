<form *ngIf="characterForm" [formGroup]="characterForm" (ngSubmit)="guardarCambios()" class="p-fluid grid">
  <!-- Sección de Imagen y Carga -->
<div class="col-12 mt-3 mb-4">
  <div class="grid align-items-center p-3 border-round" style="background: rgba(0,0,0,0.1); border: 1px dashed #d18a3a;">
    
    <!-- Previsualización de la imagen actual -->
    <div class="col-12 md:col-4 text-center">
      <label class="block font-bold text-white mb-2">Avatar del Personaje</label>
      <p-image 
        [src]="characterForm.get('image')?.value || 'assets/placeholder-saiyan.png'" 
        alt="Preview" 
        width="150" 
        [preview]="true"
        class="shadow-4 border-round">
      </p-image>
    </div>

    <!-- Componente de Carga -->
    <div class="col-12 md:col-8">
      <label class="block font-bold text-white mb-2">Cambiar Imagen</label>
      <p-fileupload 
        mode="basic" 
        chooseLabel="Elegir Imagen" 
        chooseIcon="pi pi-upload"
        accept="image/*" 
        maxFileSize="1000000" 
        (onSelect)="onImageSelect($event)"
        styleClass="p-button-warning">
      </p-fileupload>
      <small class="text-white-alpha-60 block mt-2">Formatos aceptados: JPG, PNG. Máx: 1MB</small>
    </div>

  </div>
</div>

  <!-- Fila 1: Nombre y Raza -->
  <div class="col-12 md:col-6 p-field">
    <label class="font-bold text-white">Nombre del Personaje</label>
    <input pInputText formControlName="name" />
  </div>
  <div class="col-12 md:col-6 p-field">
    <label class="font-bold text-white block mb-2">Raza del Personaje</label>
    <p-select 
        [options]="razas" 
        formControlName="race" 
        optionLabel="label" 
        optionValue="value" 
        placeholder="Selecciona una raza"
        [filter]="true" 
        filterBy="label"
        class="w-full">
    </p-select>
    </div>


  <!-- Fila 2: Ki Base y Max Ki (NaN corregido usando mode="decimal") -->
  <div class="col-12 md:col-6 p-field">
    <label class="font-bold text-white">Base Ki (Puntos)</label>
    <p-inputNumber formControlName="ki" mode="decimal" [useGrouping]="false"></p-inputNumber>
  </div>
  <div class="col-12 md:col-6 p-field">
    <label class="font-bold text-white">Max Ki</label>
    <p-inputNumber formControlName="maxKi" mode="decimal" [useGrouping]="false"></p-inputNumber>
  </div>

  <!-- Fila 3: Género y Afiliación -->
  <div class="col-12 md:col-6 p-field">
    <label class="font-bold text-white">Afiliación</label>
    <p-select [options]="facciones" formControlName="affiliation" optionLabel="label" optionValue="value"></p-select>
  </div>
  <div class="col-12 md:col-6 p-field">
    <label class="font-bold text-white">Género</label>
    <div class="flex gap-3 mt-2">
      <p-radioButton name="gender" value="Masculino" label="Masculino" formControlName="gender"></p-radioButton>
      <p-radioButton name="gender" value="Femenino" label="Femenino" formControlName="gender"></p-radioButton>
    </div>
  </div>

  <!-- Sección Planeta -->
  <div class="col-12 mt-3" formGroupName="originPlanet">
    <div class="p-3 border-round" style="background: rgba(255,255,255,0.1); border: 1px solid #d18a3a;">
      <h4 class="text-white mt-0">Planeta: {{characterForm.get('originPlanet.name')?.value}}</h4>
      <div class="grid">
        <div class="col-8">
          <label class="text-white">Nombre del Planeta</label>
          <input pInputText formControlName="name" />
        </div>
        <div class="col-4 flex align-items-end mb-2">
          <p-checkbox formControlName="isDestroyed" [binary]="true" label="¿Destruido?" labelStyleClass="text-white"></p-checkbox>
        </div>
      </div>
    </div>
  </div>

  <!-- Descripción -->
  <div class="col-12 p-field">
    <label class="font-bold text-white">Descripción del Personaje</label>
    <textarea pTextarea formControlName="description" rows="3"></textarea>
  </div>

  <!-- Sección Transformaciones -->
  <div class="col-12 mt-4">
    <div class="flex justify-content-between align-items-center mb-3">
      <h3 class="text-white m-0">Transformaciones ({{transformationsArray.length}})</h3>
      <button pButton type="button" icon="pi pi-plus" label="Añadir" (click)="addTransformation()" class="p-button-sm p-button-info"></button>
    </div>

    <div formArrayName="transformations">
      <div *ngFor="let trans of transformationsArray.controls; let i=index" [formGroupName]="i" 
           class="grid mb-3 p-2 border-round" style="background: rgba(0,0,0,0.2);">
        <div class="col-5 p-field">
          <small class="text-white">Nombre</small>
          <input pInputText formControlName="name" placeholder="ej: SSJ3" />
        </div>
        <div class="col-5 p-field">
          <small class="text-white">Ki de Transf.</small>
          <p-inputNumber formControlName="ki" mode="decimal" [useGrouping]="false"></p-inputNumber>
        </div>
        <div class="col-2 flex align-items-end mb-2">
          <button pButton type="button" icon="pi pi-trash" class="p-button-danger p-button-text" (click)="removeTransformation(i)"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Botones de Acción -->
  <div class="col-12 flex justify-content-end gap-2 mt-4">
    <button pButton type="button" label="CANCELAR" (click)="onCancel()" class="p-button-secondary p-button-outlined"></button>
    <button pButton type="submit" label="GUARDAR CAMBIOS" class="p-button-warning font-bold"></button>
  </div>
</form>
