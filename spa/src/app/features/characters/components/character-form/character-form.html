<form *ngIf="characterForm" [formGroup]="characterForm" (ngSubmit)="guardarCambios()" class="p-fluid grid p-3">

    <!-- SECCIÓN 1: IMAGEN Y DATOS -->
    <div class="col-12 grid db-container mb-3" id="section1">
        
        <!-- AVATAR CON SIGNAL -->
        <div class="col-12 md:col-4 flex flex-column align-items-center justify-content-center modulo imagen">
            <div class="relative">
                <!-- Usamos imagePreview() -->
                <p-image [src]="imagePreview() || 'assets/placeholder.png'" height="265" width="180" class="db-avatar shadow-8"></p-image>
                <p-fileupload mode="basic" (onSelect)="onImageSelect($event)" auto="true" chooseIcon="pi pi-plus" class="absolute"></p-fileupload>
            </div>
        </div>

        <!-- DATOS BÁSICOS -->
        <div class="col-12 md:col-8 grid modulo character">
            <div class="col-12"><span class="section-title">Datos Básicos</span></div>
            
            <div class="col-6">
                <span class="db-label">Nombre</span>
                <input pInputText formControlName="name" class="w-full" />
            </div>

            <div class="col-6">
                <span class="db-label">Raza</span>
                <!-- Usamos razas() -->
                <p-select [options]="razas()" formControlName="race" optionLabel="label" optionValue="value" placeholder="Seleccione Raza" class="w-full"></p-select>
            </div>

            <div class="col-6">
                <span class="db-label">Género</span>
                <p-select [options]="[{label:'Masculino', value:'Masculino'}, {label:'Femenino', value:'Femenino'}]" formControlName="gender" optionLabel="label" optionValue="value" placeholder="Género" class="w-full"></p-select>
            </div>

            <div class="col-6">
                <span class="db-label">Afiliación</span>
                <!-- Usamos facciones() -->
                <p-select [options]="facciones()" formControlName="affiliation" optionLabel="label" optionValue="value" class="w-full"></p-select>
            </div>
        </div>

        <!-- PLANETA (DENTRO DE SECCIÓN 1) -->
        <div class="col-12 mt-3 p-3 modulo" formGroupName="originPlanet">
            <div><span class="section-title">Planeta de Origen</span></div>
            <div class="grid">
                <div class="col-4">
                    <span class="db-label">Nombre de Planeta</span>
                    <input pInputText formControlName="name" class="w-full" />
                </div>

                <div class="col-4 flex align-items-center mt-3 gap-2">
                    <p-checkbox formControlName="isDestroyed" [binary]="true" inputId="destroyedCheck"></p-checkbox>
                    <!-- Usamos el computed planetaEstado() -->
                    <label for="destroyedCheck" class="text-white font-bold cursor-pointer" style="color: #fff;">
                        {{ planetaEstado() }}
                    </label>
                </div>

                <div class="col-4">
                    <span class="db-label">Descripción</span>
                    <textarea pTextarea formControlName="description" rows="1" class="textarea w-full"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- SECCIÓN 2: MEDIDORES DE KI -->
    <div class="col-12 grid px-0" id="section2">
        <div class="col-6 medidorDePoder">
            <div class="db-container text-center">
                <span class="db-label">BASE KI</span>
                <p-inputNumber formControlName="ki" mode="decimal" [useGrouping]="true" class="w-full"></p-inputNumber>
            </div>
        </div>
        <div class="col-6 medidorDePoder">
            <div class="db-container text-center">
                <span class="db-label">MAX KI</span>
                <p-inputNumber formControlName="maxKi" mode="decimal" [useGrouping]="true" class="w-full"></p-inputNumber>
            </div>
        </div>
    </div>

    <!-- SECCIÓN 3: BIO -->
    <div class="col-12 mt-3 db-container" id="section3">
        <span class="db-label">Descripción de personaje</span>
        <textarea pTextarea formControlName="description" rows="4" class="textarea w-full"></textarea>
    </div>

    <!-- SECCIÓN 4: TRANSFORMACIONES -->
    <div class="col-12 mt-3 db-container" formArrayName="transformations" id="seccion4">
        <div class="flex justify-content-between align-items-center mb-2">
            <span class="section-title">Transformaciones</span>
            <button pButton type="button" label="AÑADIR" (click)="addTransformation()" class="p-button-text p-button-warning"></button>
        </div>

        <section class="transformaciones">
            <div *ngIf="transformationsArray.controls.length === 0" class="text-center p-4 border-round border-1 border-gray-700 mb-2">
                <span class="text-gray-500 italic">No hay transformaciones registradas.</span>
            </div>

            <div *ngFor="let trans of transformationsArray.controls; let i=index" [formGroupName]="i" class="trans-item p-3 mb-3 border-1 border-gray-700 border-round surface-card">
                <div class="mb-2 text-primary font-bold">Transformación #{{i + 1}}</div>
                <div class="flex flex-column gap-3">
                    <input pInputText formControlName="name" placeholder="Nombre" class="w-full" />
                    <div class="grid p-0 m-0">
                        <div class="col-6 pl-0">
                            <p-inputNumber formControlName="ki" placeholder="Ki" class="w-full"></p-inputNumber>
                        </div>
                        <div class="col-6 pr-0">
                            <p-inputNumber formControlName="numericKi" placeholder="Ki Numérico" class="w-full"></p-inputNumber>
                        </div>
                    </div>
                    <button type="button" pButton icon="pi pi-trash" (click)="removeTransformation(i)" class="p-button-danger p-button-text w-full" label="Eliminar"></button>
                </div>
            </div>
        </section>
    </div>

    <!-- SECCIÓN 5: FECHA -->
    <div class="col-12 mt-3 db-container" id="seccion5">
        <span class="db-label">Fecha de Registro</span>
        <p-datepicker formControlName="date" [showIcon]="true" appendTo="body" dateFormat="dd/mm/yy" class="w-full"></p-datepicker>
    </div>

    <!-- BOTONES FINALES -->
    <div class="col-12 flex justify-content-center mt-4 gap-3">
        <button pButton type="submit" label="GUARDAR CAMBIOS" class="btn-guardar px-5"></button>
        <button pButton type="button" label="CANCELAR" (click)="onCancel()" class="p-button-secondary"></button>
    </div>
</form>
