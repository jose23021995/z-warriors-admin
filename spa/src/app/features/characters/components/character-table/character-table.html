<div class="card shadow-2 border-round">
    <!-- Buscador Superior -->
    <div class=" p-3 gap-2 bg-gray-50 border-bottom-1 border-gray-200"
    id="filtro">
        <p-iconField iconPosition="left" class="w-full">
            <p-inputIcon styleClass="pi pi-search"></p-inputIcon>
            <input 
                pInputText 
                type="text" 
                [(ngModel)]="searchQuery" 
                (keyup.enter)="triggerSearch()"
                placeholder="Buscar por nombre o raza" 
                class="w-full border-round-lg" />
        </p-iconField>
        <p-button 
            label="Buscar" 
            icon="pi pi-search" 
            styleClass="p-button-success border-round-lg"
            (click)="triggerSearch()">
        </p-button>
    </div>

    <!-- Tabla de Personajes -->
    <p-table 
        [value]="displayData()" 
        [lazy]="true" 
        (onLazyLoad)="loadCharactersLazy($event)"
        [paginator]="true" 
        [rows]="rows()" 
        [totalRecords]="displayTotal()" 
        [loading]="loading()" 
        [rowsPerPageOptions]="[5, 10, 50, 100]" 
        styleClass="p-datatable-gridlines p-datatable-striped"
        [tableStyle]="{ 'min-width': '60rem' }">
        
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 10%">🖼️ Avatar</th>
                <th style="width: 15%">🏷️ Nombre</th>
                <th style="width: 15%">🧬 Raza</th>
                <th style="width: 10%" class="text-center">🚻 Género</th>
                <th style="width: 25%">⚡ Ki (Base / Máx)</th>
                <th style="width: 15%">🛡️ Afiliación</th>
                <th style="width: 10%">⚙️ Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-char>
            <tr>
                <td>
                    <p-image 
                        [src]="char.image" 
                        [alt]="char.name" 
                        width="50" 
                        height="130"
                        [preview]="true"
                        styleClass="border-round shadow-1">
                    </p-image>
                </td>
                <td>
                    <span class="font-bold text-900">{{ char.name }}</span>
                </td>
                <td>
                    <p-tag [value]="char.race" [severity]="getRaceSeverity(char.race)"></p-tag>
                </td>
                <td class="text-center">
                    <i class="pi" 
                       [ngClass]="{
                           'pi-mars text-blue-500': char.gender === 'Male', 
                           'pi-venus text-pink-500': char.gender === 'Female'
                       }" 
                       style="font-size: 1.5rem"
                       [pTooltip]="char.gender">
                    </i>
                </td>
                <td>
                    <div class="flex flex-column gap-2">
                        <div class="flex justify-content-between text-xs">
                            <span class="font-semibold text-primary">B: {{ char.ki }}</span>
                            <span class="text-color-secondary">M: {{ char.maxKi }}</span>
                        </div>
                        <!-- Barra de progreso dinámica -->
                        <p-progressBar 
                            [value]="getKiPercentage(char.ki, char.maxKi)" 
                            [showValue]="false" 
                            [style]="{ height: '8px' }"
                            severity="warning">
                        </p-progressBar>
                    </div>
                </td>
                <td>
                    <span class="text-sm bg-gray-100 px-2 py-1 border-round font-medium">
                        {{ char.affiliation }}
                    </span>
                </td>
                <td>
                    <div class="flex gap-2">
                        <p-button 
                            icon="pi pi-pencil" 
                            [rounded]="true" 
                            [text]="true" 
                            severity="secondary"
                            (click)="returnInformationModal(char)"
                            pTooltip="Editar">
                        </p-button>
                        <p-button 
                            icon="pi pi-eye" 
                            [rounded]="true" 
                            [text]="true" 
                            severity="info"
                            (click)="returnInformationModal(char)"
                            pTooltip="Detalles">
                        </p-button>
                    </div>
                </td>
            </tr>
        </ng-template>

        <!-- Skeleton para estado de carga -->
        <ng-template pTemplate="loadingbody">
            <tr *ngFor="let i of [1,2,3,4,5]">
                <td><p-skeleton shape="circle" size="3rem"></p-skeleton></td>
                <td><p-skeleton width="80%"></p-skeleton></td>
                <td><p-skeleton width="60%"></p-skeleton></td>
                <td><p-skeleton width="2rem" class="mx-auto"></p-skeleton></td>
                <td><p-skeleton width="100%" height="8px"></p-skeleton></td>
                <td><p-skeleton width="70%"></p-skeleton></td>
                <td><p-skeleton width="4rem"></p-skeleton></td>
            </tr>
        </ng-template>
    </p-table>
</div>
