<div class="card shadow-2 border-round">
    <!-- Buscador Superior -->
    <div class="flex justify-content-between p-3 gap-2 bg-gray-50 border-bottom-1 border-gray-200">
        <p-iconField iconPosition="left" class="w-full">
            <p-inputIcon styleClass="pi pi-search"></p-inputIcon>
            <input 
                pInputText 
                type="text" 
                [(ngModel)]="searchQuery" 
                (keyup.enter)="triggerSearch()"
                placeholder="Buscar por nombre o raza..." 
                class="w-full" />
        </p-iconField>
        <p-button label="Buscar" icon="pi pi-search" (click)="triggerSearch()"></p-button>
    </div>

    <!-- Tabla Corregida -->
    <p-table 
        [value]="displayData()" 
        [lazy]="true" 
        (onLazyLoad)="loadCharactersLazy($event)"
        [paginator]="true" 
        [rows]="rows()" 
        [totalRecords]="displayTotal()" 
        [loading]="loading()" 
        [rowsPerPageOptions]="[5, 10, 50, 100]" 
        styleClass="p-datatable-gridlines p-datatable-striped"
        [tableStyle]="{ 'min-width': '50rem' }">
        
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 10%">Avatar</th>
                <th style="width: 20%">Nombre</th>
                <th style="width: 15%">Raza</th>
                <th style="width: 10%" class="text-center">Género</th>
                <th style="width: 20%">Ki (Base / Máximo)</th>
                <th style="width: 15%">Afiliación</th>
                <th style="width: 10%">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-char>
            <tr>
                <td>
                    <p-image [src]="char.image" width="50" [preview]="true"></p-image>
                </td>
                <td><span class="font-bold">{{ char.name }}</span></td>
                <td>
                    <p-tag [value]="char.race" [severity]="getRaceSeverity(char.race)"></p-tag>
                </td>
                <td class="text-center">
                    <i class="pi" [ngClass]="{'pi-mars text-blue-500': char.gender === 'Male', 'pi-venus text-pink-500': char.gender === 'Female'}" style="font-size: 1.5rem"></i>
                </td>
                <td>
                    <div class="flex flex-column">
                        <span class="text-sm">B: {{ char.ki }}</span>
                        <span class="text-xs text-secondary">M: {{ char.maxKi }}</span>
                    </div>
                </td>
                <td><span class="text-sm">{{ char.affiliation }}</span></td>
                <td>
                    <div class="flex gap-2">
                        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="secondary"></p-button>
                        <p-button icon="pi pi-eye" [rounded]="true" [text]="true" severity="info"></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
