<div class="card">
    <p-table 
        #dt1 
        [value]="data().length > 0 ? data() : mockData" 
        [rows]="10" 
        [paginator]="true" 
        styleClass="p-datatable-gridlines"
        [globalFilterFields]="['name', 'race']">
        
        <ng-template pTemplate="header">
            <tr>
                <th>Avatar</th>
                <th pSortableColumn="name">Nombre <p-sortIcon field="name"></p-sortIcon></th>
                <th>Raza</th>
                <th>Género</th>
                <th pSortableColumn="ki">Ki Máximo <p-sortIcon field="ki"></p-sortIcon></th>
                <th>Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-char>
            <tr>
                <td>
                    <!-- p-image con previsualización -->
                    <p-image 
                        [src]="char.image" 
                        alt="Avatar" 
                        width="50" 
                        [preview]="true">
                    </p-image>
                </td>
                <td>
                    <span class="font-bold text-primary">{{ char.name }}</span>
                </td>
                <td>
                    <p-tag [value]="char.race" [severity]="getRaceSeverity(char.race)"></p-tag>
                </td>
                <td class="text-center">
                    <i class="pi" 
                       [ngClass]="{'pi-mars text-blue-500': char.gender === 'male', 'pi-venus text-pink-500': char.gender === 'female'}" 
                       style="font-size: 1.2rem"></i>
                </td>
                <td>
                    <div class="flex flex-column">
                        <span class="mb-1 text-xs">{{ char.ki | number }} / 10,000</span>
                        <p-progressBar [value]="(char.ki / 10000) * 100" [showValue]="false" [style]="{'height': '6px'}"></p-progressBar>
                    </div>
                </td>
                <td>
                    <div class="flex gap-2">
                        <button pButton icon="pi pi-pencil" class="p-button-rounded p-button-text" pTooltip="Editar"></button>
                        <button pButton icon="pi pi-search" class="p-button-rounded p-button-info p-button-text" pTooltip="Ver Detalle"></button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
